# You can have several different profiles and use LESMA_PROFILE environment
# variable to switch between them. By default release is used.
# See https://rocket.rs/v0.5-rc/guide/configuration/#profiles for more info.
#
# All configuration parameters can also be set with environment variables.
# For each parameter, the corresponding environment variable is indicated.
# Note that all parameters are optional, if not defined the default values
# are used.
#
# If you want to use this configuration file, copy it as /etc/lesma.toml or
# as lesma.toml together with the executable file.
[release]
# Listen address, default 127.0.0.1
# Note that it is always better to put a web server like nginx in front
# LESMA_ADDRESS
#address = "127.0.0.1"
# Listen port, default 8000
# LESMA_PORT
#port = 8000
# When a new URL for a paste or file is generated use http or https, by
# default is set to false and uses http
# LESMA_HTTPS
#https=true
# Valid domains when generating URLs for new pastes or files, by default is
# set to ["localhost:8000", "127.0.0.1:8000"]
# LESMA_DOMAINS
#domains = [
#  "localhost:8000",
#  "127.0.0.1:8000",
#  "lesma.eu"
#]
# Log level, the valid values are `critical`, `normal`, `debug`, `off`, if
# not defined the default value is off
# LESMA_LOG_LEVEL
#log_level = "normal"
# The text size limit sets the limit for the information posted as text,
# default 1MiB. If you simply indicate a number the is in bytes but you can
# use the suffixes kB, MB, GB.. for powers of ten or KiB, MiB, GiB.. for
# powers of two
# LESMA_TEXT_SIZE_LIMIT
#text_size_limit = "100MiB"
# The binary size limit sets the limit for uploaded files, default 10MiB.
# The size setting is made in the same way as for text_size_limit
# LESMA_BINARY_SIZE_LIMIT
#binary_size_limit = "5GiB"
# Default download limit for every paste or file created with a plain client
# like curl where a different value is not specified , default
# 0 (unlimited), maximum accepted value 255
# LESMA_DEFAULT_LIMIT_PLAIN
#default_limit_plain = 1
# Default download limit for every paste or file created with a browser like
# Firefox where a different value is not specified , default 0 (unlimited),
# maximum accepted value 255
# LESMA_DEFAULT_LIMIT_BROWSER
#default_limit_browser = 1
# Default expiration time (in hours) for each paste or file created with
# a plain client like curl when a different value is not specified, default
# 720 hours (30 days)
# LESMA_DEFAULT_EXPIRE_PLAIN
#default_expire_plain = 48
# Default expiration time (in hours) for each paste or file created with
# a browser like Firefox when a different value is not specified, default
# 24 hours
# LESMA_DEFAULT_EXPIRE_BROWSER
#default_expire_browser = 24
# Maximum expiration time that an user can set (in hours) for each paste or
# file, default 720 hours (30 days)
# LESMA_MAX_EXPIRE
#max_expire = 168
# Location of lesmas storage, if not defined, a temporary directory will be
# used, usually /tmp
# LESMA_STORAGE
#storage = "__DATA_DIR__"

# Production sample
# Environment variable LESMA_PROFILE must be set to pro to load this profile
# export LESMA_PROFILE=pro
[pro]
address = "127.0.0.1"
port = __PORT__
https=true
domains = [
  "localhost:__PORT__",
  "127.0.0.1:__PORT__",
  "lesma.eu"
]
log_level = "critical"
text_size_limit = "100MiB"
binary_size_limit = "5GiB"
default_limit = 0
default_expire = 720
max_expire = 2160
storage = "__DATA_DIR__"

# Other sample
[debug]
address = "127.0.0.1"
port = 9000
log_level = "debug"
storage = "/tmp/lesma"
