#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2

id = "lesma"
name = "Lesma"
description.en = "Simple paste"
description.fr = "Expliquez en *quelques* (10~15) mots l'utilité de l'app ou ce qu'elle fait (l'objectif est de donner une idée grossière pour des utilisateurs qui naviguent dans un catalogue de 100+ apps)"

version = "1.3.2~ynh1"

maintainers = ["eric_G"]

[upstream]
license = "GPL-3.0-only"
demo = "https://lesma.eu/"
code = "https://gitlab.com/ogarcia/lesma"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64"]
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]

    [install.domain]
    type = "domain"

    #[install.path]
    #type = "path"
    #default = "/example"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    url = "https://gitlab.com/api/v4/projects/42779682/packages/generic/lesma/1.3.2/lesma-1.3.2-linux-amd64.tar.xz"
    sha256 = "ddb85e51ab5bc098c6dca6dbc1f30b8d6e3189da40c6f40f366a74cf970c5fa6"

    # autoupdate.strategy = "latest_github_tag"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
